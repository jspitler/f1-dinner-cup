	/* =========================================
	   F1 DARK THEME (Clean Rebuild-11:52AM)
	========================================= */

	:root{
	  --bg-main:#0b0f14;
	  --bg-elev:#111722;
	  --bg-card:rgba(20,26,36,.85);

	  --text:#f1f5f9;
	  --muted:#9aa4b2;

	  --border:rgba(255,255,255,.08);
	  --border-strong:rgba(255,255,255,.18);

	  --accent:#e10600; /* F1 Red */
	  --accent-soft:rgba(225,6,0,.18);

	  --radius:18px;
	}

	/* =========================================
	   BASE
	========================================= */

	body{
	  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
	  margin:16px;
	  color:var(--text);
	  min-height:100vh;

	  background:
		radial-gradient(1000px 700px at 15% 0%, rgba(225,6,0,.08), transparent 60%),
		radial-gradient(800px 600px at 90% 20%, rgba(255,255,255,.03), transparent 60%),
		linear-gradient(180deg,#0b0f14 0%,#0f141c 50%,#0b0f14 100%);
	}

	.app{
	  max-width:1100px;
	  margin:0 auto;
	}

	h1{
	  margin:0;
	  font-size:22px;
	  letter-spacing:-.3px;
	}

	.small{ font-size:12px; color:var(--muted); }
	.muted{ color:var(--muted); }
	.mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

	.row{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
	.grow{ flex:1 1 auto; }

	.divider{
	  height:1px;
	  background:linear-gradient(to right, transparent, var(--accent-soft), transparent);
	  margin:12px 0;
	}

	/* =========================================
	   HEADER
	========================================= */

	.topbar{
	  display:flex;
	  justify-content:space-between;
	  align-items:flex-end;
	  gap:12px;
	  padding:16px;

	  background:rgba(18,22,30,.85);
	  backdrop-filter:blur(12px);
	  border:1px solid var(--border);
	  border-radius:var(--radius);
	  box-shadow:0 20px 50px rgba(0,0,0,.6);
	  margin-bottom:14px;
	}

	/* =========================================
	   CARDS
	========================================= */

	.card{
	  border:1px solid var(--border);
	  background:var(--bg-card);
	  backdrop-filter:blur(10px);
	  border-radius:var(--radius);
	  padding:14px;
	  box-shadow:0 20px 45px rgba(0,0,0,.55);
	}

	/* =========================================
	   TABS
	========================================= */

	.tabs{
	  display:flex;
	  gap:8px;
	  flex-wrap:wrap;
	  padding:8px;
	  border-radius:var(--radius);
	  border:1px solid var(--border);
	  background:rgba(15,20,28,.9);
	  margin-bottom:12px;
	}

	.tab{
	  padding:8px 14px;
	  border-radius:12px;
	  border:1px solid transparent;
	  background:transparent;
	  color:var(--muted);
	  cursor:pointer;
	  transition:all .18s ease;
	}

	/* hover only inactive */
	.tab:not(.active):hover{
	  color:#fff;
	  background:rgba(255,255,255,.05);
	  transform:translateY(-1px);
	}

	.tab.active{
	  background:var(--accent);
	  color:#fff;
	  border-color:var(--accent);
	  box-shadow:0 8px 20px rgba(225,6,0,.4);
	}

	/* =========================================
	   BUTTONS
	========================================= */

	.btn{
	  padding:8px 12px;
	  border-radius:12px;
	  border:1px solid var(--border);
	  background:var(--bg-elev);
	  color:var(--text);
	  cursor:pointer;
	  transition:all .15s ease;
	}

	.btn:hover{
	  background:rgba(255,255,255,.06);
	  transform:translateY(-1px);
	}

	.btn.primary{
	  background:var(--accent);
	  border-color:var(--accent);
	  color:#fff;
	  box-shadow:0 10px 22px rgba(225,6,0,.35);
	}

	.btn.primary:hover{
	  box-shadow:0 14px 30px rgba(225,6,0,.45);
	}

	/* =========================================
	   TABLES
	========================================= */

	table{
	  width:100%;
	  border-collapse:collapse;
	}

	th, td{
	  border:1px solid var(--border);
	  padding:6px 8px;
	  text-align:left;
	}

	th{
	  background:rgba(255,255,255,.05);
	  color:#fff;
	  position:sticky;
	  top:0;
	  z-index:1;
	}

	.right{ text-align:right; }

	/* =========================================
	   FORM ELEMENTS
	========================================= */

	select,
	input[type="number"]{
	  padding:6px 8px;
	  border-radius:12px;
	  border:1px solid var(--border);
	  background:var(--bg-elev);
	  color:var(--text);
	  max-width:100%;
	}

	input[type="number"]{ width:70px; }

	select:focus,
	input:focus,
	button:focus{
	  outline:none;
	  border-color:var(--accent);
	  box-shadow:0 0 0 2px var(--accent-soft);
	}

	/* =========================================
	   PILLS (FIXED FOR DARK)
	========================================= */

	.pill{
	  display:inline-flex;
	  align-items:center;
	  gap:6px;
	  padding:4px 10px;
	  border-radius:999px;
	  font-size:12px;
	  border:1px solid var(--border);
	  background:rgba(255,255,255,.06);
	  color:#fff;
	}

	/* Sprint badge */
	.pill span.muted{
	  color:#d1d5db;
	}

	/* Status */
	.ok{ background:rgba(0,200,0,.15); border-color:rgba(0,200,0,.4); }
	.warn{ background:rgba(255,170,0,.18); border-color:rgba(255,170,0,.45); }
	.danger{ background:rgba(225,6,0,.25); border-color:rgba(225,6,0,.6); }

	/* =========================================
	   CHIPS
	========================================= */

	.chip{
	  display:inline-flex;
	  align-items:center;
	  gap:8px;
	  padding:4px 10px;
	  border-radius:999px;
	  font-size:12px;
	  font-weight:700;
	  white-space:nowrap;
	  border:1px solid rgba(255,255,255,.08);
	}

	  width:8px;
	  height:8px;
	  border-radius:999px;
	  background:#fff;
	  border:1px solid rgba(0,0,0,.4);
	}

	   GRID
	========================================= */

	.scroll{ max-height:62vh; overflow:auto; border-radius:var(--radius); }

	@media (min-width:920px){
	  .two{ grid-template-columns:1fr 1fr; }
	}

   STATE / STORAGE

const STORAGE_KEY = "spitler_f1_fantasy_server_cache_v1";

function buildAllEventsFromWeekends() {
  const map = new Map();
  for (const w of weekends) for (const e of w.events) map.set(e.id, e);
  return [...map.values()];
}
const events = buildAllEventsFromWeekends();

function defaultState() {
  // results[eventId][driverId] = finishing place
  const results = {};
  for (const e of events) results[e.id] = {};

  // seasonPicks[player] = { driverId, teamName }
  const seasonPicks = {};
  for (const p of players) seasonPicks[p] = { driverId: "", teamName: "" };

  // weeklyPick[weekendId][player][eventId] = driverId
  const weeklyPick = {};
  for (const w of weekends) {
    weeklyPick[w.id] = {};
    for (const p of players) {
      weeklyPick[w.id][p] = {};
      for (const e of w.events) weeklyPick[w.id][p][e.id] = "";
    }
  }

  // lock[weekendId][eventId] = boolean (two-stage lock)
  const lock = {};
  for (const w of weekends) {
    lock[w.id] = {};
    for (const e of w.events) lock[w.id][e.id] = false;
  }

  // seasonLock: locks season picks (before race 1)
  const seasonLock = false;

  return {
    results,
    seasonPicks,
    weeklyPick,
    lock,
    seasonLock,
    ui: { view:"weekend", selectedWeekendId: weekends[0]?.id || "" }
  };
}

async function loadStateFromServer() {
  const res = await fetch(`${API_BASE}/state`, { method: "GET" });
  if (!res.ok) throw new Error("Failed to load state");
  const data = await res.json();
  // If DB row is empty, use defaults
  if (!data || (typeof data === "object" && Object.keys(data).length === 0)) return defaultState();
  // Merge with defaults to tolerate app updates
  return { ...defaultState(), ...data };
}

function loadStateFromLocalCache() {
  // Optional fallback if you’re offline or the API is down
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return { ...defaultState(), ...parsed };
  } catch {
    return defaultState();
  }
}

let state = defaultState();
let saveTimer = null;
let saveDebounceTimer = null;

function setSaveStatus(text) {
  const el = document.getElementById("saveStatus");
  if (!el) return;
  el.textContent = text || "";
}

function cacheLocally() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

async function pushStateToServer() {
  const res = await fetch(`${API_BASE}/state`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(state),
  });
  if (!res.ok) throw new Error("Failed to save state");
}

function saveState() {
  // Debounced save so typing/scrolling doesn't hammer the API
  cacheLocally();
  setSaveStatus("Saving…");

  clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(async () => {
    try {
      await pushStateToServer();
      setSaveStatus("Saved");
    } catch (e) {
      setSaveStatus("Offline (saved locally)");
    }
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => setSaveStatus(""), 1200);
  }, 350);
}

  const c = teamColors[team] || { bg:"#f2f2f2", fg:"#111" };
  return `<span class="chip" style="background:${c.bg}; color:${c.fg};">
    <span class="chip-dot"></span>${team}

}

// Driver dropdown options: driver name only (no team label)
function driverOptionsHTML(selectedId, includeBlank=true) {
  const sorted = drivers.slice().sort((a,b) => a.name.localeCompare(b.name));
  const opts = sorted.map(d => {
    const c = teamColors[d.team] || {};
    const style = c.bg ? `style="background:${c.bg}; color:${c.fg};"` : "";
    return `<option value="${d.id}" ${d.id===selectedId?"selected":""} ${style}>${d.name}</option>`;
  }).join("");
  return (includeBlank ? `<option value="" ${!selectedId?"selected":""}>(select)</option>` : "") + opts;
}

function teamOptionsHTML(selectedTeam, includeBlank=true) {
  const opts = teams.map(t => {
    const c = teamColors[t] || {};
    const style = c.bg ? `style="background:${c.bg}; color:${c.fg};"` : "";
    return `<option value="${t}" ${t===selectedTeam?"selected":""} ${style}>${t}</option>`;
  }).join("");
  return (includeBlank ? `<option value="" ${!selectedTeam?"selected":""}>(select)</option>` : "") + opts;
}

function setView(view) {
  state.ui.view = view;
  saveState();
  render();
}

function setSelectedWeekend(id) {
  state.ui.selectedWeekendId = id;
  saveState();
  render();
}

function weekendIndexById(id) {
  return weekends.findIndex(w => w.id === id);
}

// Picks the next weekend in the calendar (no skipping).
function goNextWeekend() {
  const idx = weekendIndexById(state.ui.selectedWeekendId);
  const nextIdx = idx + 1;
  if (nextIdx >= 0 && nextIdx < weekends.length) setSelectedWeekend(weekends[nextIdx].id);
}

// Picks the previous weekend in the calendar (no skipping).
function goPrevWeekend() {
  const idx = weekendIndexById(state.ui.selectedWeekendId);
  const prevIdx = idx - 1;
  if (prevIdx >= 0 && prevIdx < weekends.length) setSelectedWeekend(weekends[prevIdx].id);
}

// Jumps to the next weekend that still has at least one unlocked event.
// If the currently selected weekend is still open, this keeps you on it.
function goNextOpenWeekend() {
  const start = Math.max(0, weekendIndexById(state.ui.selectedWeekendId));
  if (!weekends.length) return;

  for (let k = 0; k < weekends.length; k++) {
    const i = (start + k) % weekends.length;
    const w = weekends[i];
    if (!isWeekendFullyLocked(w)) {
      setSelectedWeekend(w.id);
      return;
    }
  }
}

function isEventLocked(weekendId, eventId) {
  return !!state.lock?.[weekendId]?.[eventId];
}

function isWeekendFullyLocked(weekend) {
  return weekend.events.every(e => isEventLocked(weekend.id, e.id));
}


function weekendHasOpenPicks(weekend){
  // "open" means at least one event is not locked
  return weekend.events.some(e => !isEventLocked(weekend.id, e.id));
}

function weekendHasOpenResults(weekend){
  // "open" means results are not fully entered (any blank/0 for any driver for any event in the weekend)
  return weekend.events.some(e => {
    const evRes = state.results?.[e.id] || {};
    return drivers.some(d => !evRes[d.id] || Number(evRes[d.id]) <= 0);
  });
}

function selectWeekendByIndex(i){
  const clamped = Math.max(0, Math.min(weekends.length - 1, i));
  setSelectedWeekend(weekends[clamped].id);
}

function findNextWeekend(fromIndex, predicate){
  for (let i = fromIndex + 1; i < weekends.length; i++){
    if (predicate(weekends[i])) return i;
  }
  return -1;
}

/* =========================================================
   SCORING
   ========================================================= */

function pointsFor(eventType, place) {
  if (!place || place <= 0) return 0;
  if (eventType === "GP") return pointsGP[place] || 0;
  if (eventType === "SP") return pointsSP[place] || 0;
  return 0;
}

function computeDriverTotals() {
  const totals = {};
  for (const d of drivers) totals[d.id] = 0;

  for (const e of events) {
    const evRes = state.results[e.id] || {};
    for (const d of drivers) {
      const place = Number(evRes[d.id] || 0);
      totals[d.id] += pointsFor(e.type, place);
    }
  }
  return totals;
}

function computeTeamTotals(driverTotals) {
  const teamTotals = {};
  for (const t of teams) teamTotals[t] = 0;
  for (const d of drivers) {
    teamTotals[d.team] = (teamTotals[d.team] || 0) + (driverTotals[d.id] || 0);
  }
  return teamTotals;
}

function computeWeekendPlayerPoints(weekend, player) {
  let sum = 0;
  for (const e of weekend.events) {
    const pickDriverId = state.weeklyPick?.[weekend.id]?.[player]?.[e.id] || "";
    if (!pickDriverId) continue;
    const place = Number((state.results[e.id] || {})[pickDriverId] || 0);
    sum += pointsFor(e.type, place);
  }
  return sum;
}

function computeSeasonPickTotalForPlayer(player, driverTotals, teamTotals) {
  const pick = state.seasonPicks[player];
  const dPts = pick?.driverId ? (driverTotals[pick.driverId] || 0) : 0;
  const tPts = pick?.teamName ? (teamTotals[pick.teamName] || 0) : 0;
  return dPts + tPts;
}

function computeWeekendWinner(weekend) {
  const driverTotals = computeDriverTotals();
  const teamTotals = computeTeamTotals(driverTotals);

  const scores = players.map(p => {
    const picks = {};
    for (const e of weekend.events) picks[e.id] = state.weeklyPick?.[weekend.id]?.[p]?.[e.id] || "";
    const weekendPts = computeWeekendPlayerPoints(weekend, p);
    const seasonTiePts = computeSeasonPickTotalForPlayer(p, driverTotals, teamTotals);
    return { player: p, picks, weekendPts, seasonTiePts };
  });

  const maxWeekend = Math.max(...scores.map(s => s.weekendPts));
  const topWeekend = scores.filter(s => s.weekendPts === maxWeekend);

  if (topWeekend.length === 1 && maxWeekend > 0) {
    return { type: "winner", winner: topWeekend[0].player, scores };
  }

  const allSameWeekend = scores.every(s => s.weekendPts === scores[0].weekendPts);
  if (allSameWeekend && maxWeekend === 0) {
    const maxTie = Math.max(...scores.map(s => s.seasonTiePts));
    const topTie = scores.filter(s => s.seasonTiePts === maxTie);
    if (topTie.length === 1) return { type: "tiebreak_winner", winner: topTie[0].player, scores };
    return { type: "tie", winners: topTie.map(x => x.player), scores, tieReason:"season" };
  }

  return { type:"tie", winners: topWeekend.map(x => x.player), scores, tieReason:"weekend" };
}

/* =========================================================
   RENDER + WIRING
   ========================================================= */

function render() {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === state.ui.view));

  const el = document.getElementById("view");
  const view = state.ui.view;

  if (view === "weekend") el.innerHTML = viewWeekend();
  else if (view === "season") el.innerHTML = viewSeason();
  else if (view === "leaderboard") el.innerHTML = viewLeaderboards();
  else if (view === "results") el.innerHTML = viewResults();
  else el.innerHTML = viewWeekend();

  wireViewHandlers();
}

function wireViewHandlers() {
  // Weekend select
  const weekendSelect = document.getElementById("weekendSelect");
  if (weekendSelect) weekendSelect.addEventListener("change", (e) => setSelectedWeekend(e.target.value));

  // Next/Prev shortcuts
  const btnPrevWeekend = document.getElementById("btnPrevWeekend");
  if (btnPrevWeekend) btnPrevWeekend.addEventListener("click", () => goPrevWeekend());

  const btnNextWeekend = document.getElementById("btnNextWeekend");
  if (btnNextWeekend) btnNextWeekend.addEventListener("click", () => goNextWeekend());

  const btnNextOpenWeekend = document.getElementById("btnNextOpenWeekend");
  if (btnNextOpenWeekend) btnNextOpenWeekend.addEventListener("click", () => goNextOpenWeekend());

  // Per-event lock buttons
  document.querySelectorAll('button[data-lock-weekend][data-lock-event]').forEach(btn => {
    btn.addEventListener("click", (e) => {
      const wId = e.target.dataset.lockWeekend;
      const evId = e.target.dataset.lockEvent;
      state.lock[wId][evId] = !state.lock[wId][evId];
      saveState();
      render();
    });
  });

  // Per-event weekly pick selects
  document.querySelectorAll('select[data-weekend][data-player][data-event]').forEach(sel => {
    sel.addEventListener("change", (e) => {
      const wId = e.target.dataset.weekend;
      const player = e.target.dataset.player;
      const eventId = e.target.dataset.event;
      state.weeklyPick[wId][player][eventId] = e.target.value;
      saveState();
      render();
    });
  });

  // Season picks
  document.querySelectorAll('select[data-season]').forEach(sel => {
    sel.addEventListener("change", (e) => {
      if (state.seasonLock) return; // hard guard
      const kind = e.target.dataset.season;
      const player = e.target.dataset.player;
      if (kind === "driver") state.seasonPicks[player].driverId = e.target.value;
      if (kind === "team") state.seasonPicks[player].teamName = e.target.value;
      saveState();
      render();
    });
  });

  // Season lock button
  const toggleSeasonLock = document.getElementById("toggleSeasonLock");
  if (toggleSeasonLock) {
    toggleSeasonLock.addEventListener("click", () => {
      state.seasonLock = !state.seasonLock;
      saveState();
      render();
    });
  }

  // Results inputs
  document.querySelectorAll('input[type="number"][data-event]').forEach(inp => {
    inp.addEventListener("input", (e) => {
      const driverId = e.target.dataset.driver;
      const eventId = e.target.dataset.event;
      const raw = e.target.value;
      const val = raw === "" ? "" : Number(raw);

      if (!state.results[eventId]) state.results[eventId] = {};
      if (val === "") delete state.results[eventId][driverId];
      else state.results[eventId][driverId] = val;

      // Update only the points pill beside this field, without re-rendering the page
      const ev = events.find(ev => ev.id === eventId);
      const row = e.target.closest("tr");
      const pill = row ? row.querySelector(".pill") : null;
      if (pill) {
        const pts = pointsFor(ev?.type, Number(raw || 0));
        pill.textContent = `${pts} pts`;
      }
    });

    inp.addEventListener("change", () => {
      saveState();
    });

    inp.addEventListener("blur", () => {
      saveState();
    });
  });

  // Results weekend select + navigation
  const resultsWeekendSelect = document.getElementById("resultsWeekendSelect");
  if (resultsWeekendSelect) {
    resultsWeekendSelect.addEventListener("change", (e) => setSelectedWeekend(e.target.value));
  }

  const resultsPrev = document.getElementById("resultsPrev");
  if (resultsPrev) {
    resultsPrev.addEventListener("click", () => {
      const idx = Math.max(0, weekends.findIndex(w => w.id === state.ui.selectedWeekendId));
      selectWeekendByIndex(idx - 1);
    });
  }

  const resultsNext = document.getElementById("resultsNext");
  if (resultsNext) {
    resultsNext.addEventListener("click", () => {
      const idx = Math.max(0, weekends.findIndex(w => w.id === state.ui.selectedWeekendId));
      selectWeekendByIndex(idx + 1);
    });
  }

  const resultsNextOpen = document.getElementById("resultsNextOpen");
  if (resultsNextOpen) {
    resultsNextOpen.addEventListener("click", () => {
      const idx = Math.max(0, weekends.findIndex(w => w.id === state.ui.selectedWeekendId));
      const nextIdx = findNextWeekend(idx, weekendHasOpenResults);
      if (nextIdx === -1) {
        alert("No later weekends with open results found.");
        return;
      }
      selectWeekendByIndex(nextIdx);
    });
  }
}

document.querySelectorAll(".tab").forEach(btn => btn.addEventListener("click", () => setView(btn.dataset.view)));

/* =========================================================
   RESET / EXPORT / IMPORT
   ========================================================= */

document.getElementById("btnExport").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "spitler-f1-fantasy.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("fileImport").addEventListener("change", async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  const text = await file.text();

  try {
    const imported = JSON.parse(text);
    const base = defaultState();

    // results
    for (const ev of events) base.results[ev.id] = { ...(imported.results?.[ev.id] || {}) };

    // season picks
    for (const p of players) {
      base.seasonPicks[p] = {
        driverId: imported.seasonPicks?.[p]?.driverId || "",
        teamName: imported.seasonPicks?.[p]?.teamName || ""
      };
    }

    // weekly picks + locks
    for (const w of weekends) {
      for (const e2 of w.events) base.lock[w.id][e2.id] = !!imported.lock?.[w.id]?.[e2.id];
      for (const p of players) {
        for (const e2 of w.events) base.weeklyPick[w.id][p][e2.id] = imported.weeklyPick?.[w.id]?.[p]?.[e2.id] || "";
      }
    }

    // season lock
    base.seasonLock = !!imported.seasonLock;

    // ui
    base.ui.view = imported.ui?.view || base.ui.view;
    base.ui.selectedWeekendId = imported.ui?.selectedWeekendId || base.ui.selectedWeekendId;

    state = base;
    saveState();
    render();
    alert("Imported!");
  } catch {
    alert("Import failed. Make sure it's a valid JSON export from this app.");
  } finally {
    e.target.value = "";
  }
});
async function initApp(){
  setSaveStatus("Loading…");
  try {
    state = await loadStateFromServer();
    setSaveStatus("Loaded");
  } catch (e) {
    state = loadStateFromLocalCache();
    setSaveStatus("Offline (local cache)");
  }
  setTimeout(() => setSaveStatus(""), 1200);
  render();
}

initApp();
</script>
